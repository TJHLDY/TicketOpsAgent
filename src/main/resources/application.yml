spring:
  application:
    name: ticketops-agent
  ai:
    model:
      chat: none
  datasource:
    url: jdbc:h2:mem:ticketops;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always

ticketops:
  agent:
    mode: deterministic
    llm:
      enabled: false
