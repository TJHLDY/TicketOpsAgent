spring:
  application:
    name: ticketops-agent
  ai:
    model:
      chat: none
      embedding: none
    chat:
      client:
        observations:
          log-prompt: false
          log-completion: false
      observations:
        log-prompt: false
        log-completion: false
        include-error-logging: false
    tools:
      observations:
        include-content: false
    vectorstore:
      observations:
        log-query-response: false
  datasource:
    url: jdbc:h2:mem:ticketops;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always

logging:
  level:
    org.springframework.ai.vectorstore.SimpleVectorStore: warn

management:
  server:
    port: ${TICKETOPS_MANAGEMENT_PORT:8081}
    address: 127.0.0.1
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: never

ticketops:
  tools:
    max-calls-per-request: 1
  rag:
    embedding-provider: offline
    similarity-threshold: 0.30
    top-k: 1
  agent:
    mode: deterministic
    llm:
      enabled: false
      provider: deepseek
      model: ${DEEPSEEK_MODEL:deepseek-v4-flash}
      prompt-version: deepseek-shadow-v2
      schema-version: agent-decision-v1
