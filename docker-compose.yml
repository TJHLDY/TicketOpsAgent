services:
  postgres:
    image: postgres:16-alpine
    container_name: ticketops-postgres
    environment:
      POSTGRES_DB: ticketops
      POSTGRES_USER: ticketops
      POSTGRES_PASSWORD: ticketops
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketops -d ticketops"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - ticketops-postgres-data:/var/lib/postgresql/data

volumes:
  ticketops-postgres-data:
